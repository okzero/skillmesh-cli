[tool.ruff]
target-version = "py39"
line-length = 88
exclude = [".ai"]

[tool.ruff.lint]
# Start with correctness rules that can gate the legacy codebase without a
# formatting-only rewrite. Broader style adoption can be incremental.
select = ["E9", "F63", "F7", "F82"]

[tool.mypy]
python_version = "3.9"
check_untyped_defs = true
ignore_missing_imports = true
no_implicit_optional = false
warn_unused_ignores = true
exclude = "(^|/)tests/"
